name: TestPulse CI

on:
  push:
    branches:
    paths:
      - '05-testpulse/**'
      - '.github/workflows/testpulse-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '05-testpulse/**'
      - '.github/workflows/testpulse-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: 05-testpulse/ingestor
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: 05-testpulse/ingestor
        run: pytest -v
        

